    <script>
        function createLink(href, hrefTitle) {
            var a = document.createElement("a");
            a.appendChild(document.createTextNode(hrefTitle));
            a.href = href;
            a.target = "_blank";
            return a;
        }
        function insertTableData(id, data = []) {
            var table = document.getElementById(id);

            data.forEach(function(rowData) {
                var row = table.insertRow();
                var titleCell = row.insertCell();
                titleCell.innerHTML = rowData.title;
                var descriptionCell = row.insertCell();
                descriptionCell.innerHTML = rowData.description;
                var files = rowData.files || [];
                var fileCell = row.insertCell();
                files.forEach(function(file) {
                    fileCell.appendChild(createLink(file.href, file.text));
                });
            });
        }
